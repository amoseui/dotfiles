# pkm-collect 설정 — 사람/LLM이 읽고, SKILL.md가 collect.py CLI 인자로 전달한다.
# collect.py는 이 파일을 직접 파싱하지 않는다(stdlib-only 유지).

vault_path: /Users/amoseui/Obsidian/amoseui

# ★ Claude가 자동 생성하는 노트는 사람 노트와 섞지 않고 전용 폴더(5. Claude/)에만 둔다.
note_dir: "5. Claude/notes"                       # vault 기준 상대 (AI 전용)
journal_glob: "Retrospective/1. Daily/{date}.md"  # {date}=YYYY-MM-DD (내 daily note)

# 트랜스크립트 소스
claude_projects: ~/.claude/projects
codex_sessions: ~/.codex/sessions                 # Codex 미사용 시 자동 no-op
codex_history: ~/.codex/history.jsonl
include_subagents: false

# 저널 백링크 위치 — 내 daily note에는 시간대 헤딩이 없으므로 AI 전용 섹션을 만든다.
journal_logs_heading: "## 🤖 Claude 작업 로그"
journal_time_buckets:                  # 작업항목 대표 시각(로컬) → 시간대
  morning_end: "12:00"                 # 이전 = Morning
  afternoon_end: "18:00"               # 이전 = Afternoon, 이후 = Evening

# 세션 드롭 임계값
thresholds:
  min_prompts: 2
  min_edits: 1
prompt_truncate: 400

# 민감/대상외 제외
exclude:
  keywords: ["의료", "병원", "보험", "건강검진", "진료", "대장내시경"]
  paths: []                            # cwd 경로 부분 매칭(예: 특정 개인 repo)
